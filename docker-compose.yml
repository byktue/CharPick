services:
  postgres:
    image: postgres:16-alpine
    container_name: charpick-postgres
    environment:
      POSTGRES_DB: charpick
      POSTGRES_USER: charpick
      POSTGRES_PASSWORD: charpick
    ports:
      - "5432:5432"
    volumes:
      - charpick_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U charpick -d charpick"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  charpick_postgres_data: